services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: release_alert
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d release_alert"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "50051:50051"

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
