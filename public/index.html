<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Release Alert</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .logo {
      font-size: 28px;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1f2328;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #656d76;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #1f2328;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
    }

    .hint {
      font-size: 12px;
      color: #656d76;
      margin-top: -12px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 9px 16px;
      background: #1f883d;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1a7f37; }
    button:disabled { background: #94d3a2; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #dafbe1;
      border: 1px solid #56d364;
      color: #116329;
    }

    .message.error {
      background: #ffebe9;
      border: 1px solid #ff818266;
      color: #82071e;
    }

    .message.visible { display: block; }

    .links {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #d0d7de;
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    .links a {
      color: #0969da;
      text-decoration: none;
    }

    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔔</div>
    <h1>GitHub Release Alert</h1>
    <p class="subtitle">Get email notifications when a new release is published.</p>

    <form id="form">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@example.com"
        required
        autocomplete="email"
      >

      <label for="repository">Repository</label>
      <input
        type="text"
        id="repository"
        name="repository"
        placeholder="owner/repo"
        required
        pattern="[A-Za-z0-9_.\-]+/[A-Za-z0-9_.\-]+"
      >
      <p class="hint">Example: <code>golang/go</code> or <code>cli/cli</code></p>

      <button type="submit" id="btn">Subscribe</button>
    </form>

    <div class="message" id="message"></div>

    <div class="links">
      <a href="/docs">API Docs</a>
      <a href="/subscriptions">All subscriptions</a>
      <a href="/metrics">Metrics</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const msg = document.getElementById('message');

    function showMessage(text, type) {
      msg.textContent = text;
      msg.className = `message visible ${type}`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Subscribing…';
      msg.className = 'message';

      const email = document.getElementById('email').value.trim();
      const repository = document.getElementById('repository').value.trim();

      try {
        const res = await fetch('/subscriptions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, repository })
        });

        const data = await res.json();

        if (res.ok) {
          showMessage(`✓ Subscribed to ${data.repository}. You'll receive an email when a new release is published.`, 'success');
          form.reset();
        } else {
          showMessage(data.error?.message ?? 'Something went wrong.', 'error');
        }
      } catch {
        showMessage('Network error. Please try again.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Subscribe';
      }
    });
  </script>
</body>
</html>
